name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  Build-and-Test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/interviewcoach_test"
      JWT_SECRET: "ci-test-secret"
      OPENAI_API_KEY: "sk-test-ci-key"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo run db:generate

      - name: Lint all packages
        run: npx turbo run lint

      - name: Run tests
        run: npx turbo run test

      - name: Build all packages
        run: npx turbo run build

  Docker-Publish:
    needs: Build-and-Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/interviewcoach-api:latest
            ${{ secrets.DOCKER_USERNAME }}/interviewcoach-api:${{ github.sha }}

      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/interviewcoach-web:latest
            ${{ secrets.DOCKER_USERNAME }}/interviewcoach-web:${{ github.sha }}
